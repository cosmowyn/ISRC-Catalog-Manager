name: Help documentation refresh

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  CI: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONFAULTHANDLER: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen

concurrency:
  group: help-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  help-documentation:
    name: Help coverage and screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libopengl0 \
            libpulse-mainloop-glib0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon0 \
            libxkbcommon-x11-0

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate Help documentation and refresh screenshots
        run: python -m pytest -q tests/ui_qa/test_ui_pq_help_documentation.py --no-cov

      - name: Upload Help PQ artifacts
        uses: actions/upload-artifact@v7
        with:
          name: help-documentation-pq
          path: |
            artifacts/ui_pq/help
            artifacts/ui_pq/summary.md
            artifacts/ui_pq/evidence.json
            docs/help/screenshots
          if-no-files-found: error

      - name: Open refreshed screenshot pull request on main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet -- docs/help/screenshots; then
            branch="automation/help-screenshots"
            body_file="$(mktemp)"
            cat > "$body_file" <<'EOF'
          Automated Help screenshot refresh from the latest main-branch UI PQ run.

          This PR keeps the committed Help manual screenshots aligned with the real application UI while preserving the repository rule that all main-branch changes must enter through pull requests.
          EOF

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/help/screenshots
            git commit -m "Refresh help screenshots"
            git push --force origin "HEAD:${branch}"

            if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh pr edit "$branch" \
                --repo "$GITHUB_REPOSITORY" \
                --title "Refresh Help screenshots" \
                --body-file "$body_file"
            else
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base main \
                --head "$branch" \
                --title "Refresh Help screenshots" \
                --body-file "$body_file"
            fi

            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
            gh workflow run help-docs-refresh.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          fi
