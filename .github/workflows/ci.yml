name: CI

on:
  push:
  pull_request:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONFAULTHANDLER: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Compile Python sources
        run: |
          python -m py_compile ISRC_manager.py build.py icon_factory.py
          python -m py_compile $(find isrc_manager -name '*.py' | sort)
          python -m py_compile $(find scripts -name '*.py' | sort)
          python -m py_compile $(find tests -name '*.py' | sort)

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check build.py isrc_manager scripts tests

  format:
    name: Black format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Black --check
        run: python -m black --check build.py isrc_manager scripts tests

  type-check:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run mypy
        run: python -m mypy

  test-shards:
    name: Tests (${{ matrix.group }} / py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: catalog-services
            python-version: "3.10"
            qt-runtime: true
            coverage: false
            timeout-minutes: 15
            group-timeout-seconds: 600
            module-timeout-seconds: 120
          - group: catalog-services
            python-version: "3.13"
            qt-runtime: true
            coverage: true
            timeout-minutes: 15
            group-timeout-seconds: 600
            module-timeout-seconds: 120
          - group: exchange-import
            python-version: "3.13"
            qt-runtime: true
            coverage: true
            timeout-minutes: 20
            group-timeout-seconds: 900
            module-timeout-seconds: 180
          - group: history-storage-migration
            python-version: "3.13"
            qt-runtime: true
            coverage: true
            timeout-minutes: 20
            group-timeout-seconds: 900
            module-timeout-seconds: 180
          - group: ui-app-workflows
            python-version: "3.13"
            qt-runtime: true
            coverage: true
            timeout-minutes: 45
            group-timeout-seconds: 2400
            module-timeout-seconds: 300

    timeout-minutes: ${{ matrix.timeout-minutes }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install Qt runtime libraries
        if: ${{ matrix.qt-runtime }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libopengl0 \
            libpulse-mainloop-glib0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon0 \
            libxkbcommon-x11-0

      - name: Install dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .[dev]

      - name: Verify grouped test ownership
        run: python3 -m tests.ci_groups "${{ matrix.group }}" --verify

      - name: Run grouped tests
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            python3 -m coverage erase
            python3 -m tests.run_group \
              "${{ matrix.group }}" \
              --coverage \
              --module-timeout-seconds "${{ matrix.module-timeout-seconds }}" \
              --group-timeout-seconds "${{ matrix.group-timeout-seconds }}"
          else
            python3 -m tests.run_group \
              "${{ matrix.group }}" \
              --module-timeout-seconds "${{ matrix.module-timeout-seconds }}" \
              --group-timeout-seconds "${{ matrix.group-timeout-seconds }}"
          fi

      - name: Upload coverage data
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ matrix.group }}-py${{ matrix.python-version }}
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: error

  coverage-report:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: test-shards
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          path: coverage-artifacts
          merge-multiple: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .[dev]

      - name: Combine coverage data
        working-directory: coverage-artifacts
        run: |
          python3 -m coverage combine
          python3 -m coverage report
          python3 -m coverage xml

      - name: Upload coverage XML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage-artifacts/coverage.xml

  packaging-smoke:
    name: Packaging smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,build]

      - name: Verify PyInstaller is available
        run: python -m PyInstaller --version

      - name: Run build helper smoke test
        run: python -m unittest tests.test_build_requirements -v
