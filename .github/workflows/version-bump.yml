name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Skip stale workflow reruns
        id: freshness
        run: |
          git fetch origin main --tags
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Current event SHA is no longer the main branch tip; skipping."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        with:
          python-version: "3.14.4"

      - name: Generate version metadata
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        run: |
          python scripts/release_automation.py \
            --base-ref "${{ github.event.before }}" \
            --head-ref "${{ github.sha }}"

      - name: Add release badge to generated notes
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        run: |
          export VERSION="$(python -c 'from scripts.release_automation import read_project_version; print(read_project_version())')"
          RELEASE_FILE="docs/releases/v${VERSION}.md"
          BADGE="[![Release](https://img.shields.io/github/v/tag/cosmowyn/ISRC-Catalog-Manager?label=release)](https://github.com/cosmowyn/ISRC-Catalog-Manager/releases/tag/v${VERSION})"

          if [ ! -f "$RELEASE_FILE" ]; then
            echo "Release file not found: $RELEASE_FILE"
            exit 1
          fi

          if grep -Fq "$BADGE" "$RELEASE_FILE"; then
            echo "Release badge already present."
            exit 0
          fi

          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          release_file = Path(f"docs/releases/v{version}.md")
          badge = (
              "[![Release](https://img.shields.io/github/v/tag/"
              "cosmowyn/ISRC-Catalog-Manager?label=release)]"
              f"(https://github.com/cosmowyn/ISRC-Catalog-Manager/releases/tag/v{version})"
          )

          text = release_file.read_text(encoding="utf-8")
          lines = text.splitlines()

          if not lines or not lines[0].startswith("# "):
              raise SystemExit(f"Unexpected release note format: {release_file}")

          if badge in text:
              print("Release badge already present.")
              raise SystemExit(0)

          new_text = "\n".join([lines[0], "", badge, *lines[1:]]) + "\n"
          release_file.write_text(new_text, encoding="utf-8")
          PY
          

      - name: Verify synced version docs
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        run: python scripts/sync_version_docs.py --check

      - name: Commit release metadata
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        run: |
          if git diff --quiet; then
            echo "No release metadata changes."
            exit 0
          fi
          VERSION="$(python -c 'from scripts.release_automation import read_project_version; print(read_project_version())')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml isrc_manager/version.py docs/releases RELEASE_NOTES.md README.md docs/release-builds.md
          git commit -m "chore(release): v${VERSION} [skip version]"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"
