name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  version-bump:
    name: Version bump
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Skip stale workflow reruns
        id: freshness
        run: |
          git fetch origin main --tags
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "Current event SHA is no longer the main branch tip; skipping."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        with:
          python-version: "3.14.4"

      - name: Generate version metadata
        id: release_metadata
        if: ${{ steps.freshness.outputs.fresh == 'true' }}
        run: |
          python scripts/release_automation.py \
            --base-ref "${{ github.event.before }}" \
            --head-ref "${{ github.sha }}"

      - name: Add release badge to generated notes
        if: ${{ steps.freshness.outputs.fresh == 'true' && steps.release_metadata.outputs.bumped == 'true' }}
        run: |
          export VERSION="$(python -c 'from scripts.release_automation import read_project_version; print(read_project_version())')"
          export BADGE="[![Release](https://img.shields.io/github/v/tag/cosmowyn/ISRC-Catalog-Manager?label=release)](https://github.com/cosmowyn/ISRC-Catalog-Manager/releases/tag/v${VERSION})"

          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          badge = os.environ["BADGE"]

          release_files = [
              Path(f"docs/releases/v{version}.md"),
              Path("RELEASE_NOTES.md"),
          ]

          for release_file in release_files:
              if not release_file.is_file():
                  raise SystemExit(f"Release file not found: {release_file}")

              text = release_file.read_text(encoding="utf-8")
              lines = text.splitlines()

              if not lines or not lines[0].startswith("# "):
                  raise SystemExit(f"Unexpected release note format: {release_file}")

              if badge in text:
                  print(f"Release badge already present in {release_file}.")
                  continue

              updated = "\n".join([lines[0], "", badge, *lines[1:]]) + "\n"
              release_file.write_text(updated, encoding="utf-8")
              print(f"Added release badge to {release_file}.")
          PY

      - name: Verify synced version docs
        if: ${{ steps.freshness.outputs.fresh == 'true' && steps.release_metadata.outputs.bumped == 'true' }}
        run: python scripts/sync_version_docs.py --check

      - name: Commit release metadata
        if: ${{ steps.freshness.outputs.fresh == 'true' && steps.release_metadata.outputs.bumped == 'true' }}
        env:
          MAIN_AUTOMATION_DEPLOY_KEY: ${{ secrets.MAIN_AUTOMATION_DEPLOY_KEY }}
        run: |
          if git diff --quiet; then
            echo "No release metadata changes."
            exit 0
          fi

          if [ -z "${MAIN_AUTOMATION_DEPLOY_KEY:-}" ]; then
            echo "MAIN_AUTOMATION_DEPLOY_KEY is required to push through the protected main ruleset." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$MAIN_AUTOMATION_DEPLOY_KEY" > ~/.ssh/main_automation_deploy_key
          chmod 600 ~/.ssh/main_automation_deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config core.sshCommand "ssh -i ~/.ssh/main_automation_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          VERSION="$(python -c 'from scripts.release_automation import read_project_version; print(read_project_version())')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml isrc_manager/version.py docs/releases RELEASE_NOTES.md README.md docs/release-builds.md
          git commit -m "chore(release): v${VERSION} [skip version]"

          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"
