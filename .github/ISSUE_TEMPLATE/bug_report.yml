name: Bug report
description: Report a reproducible problem in ISRC Catalog Manager.
title: "[Bug Report] "
labels:
  - bug
  - user-report
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Do not paste private catalogue data, contract terms,
        royalty data, credentials, tokens, raw database rows, private documents, or audio files.
        The desktop app's Help > Report a Bug workflow is preferred because it sanitises logs
        locally before creating a preview.
  - type: input
    id: app-version
    attributes:
      label: Application version
      description: Copy the version from Help > About or the report preview if available.
      placeholder: "5.x.x"
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the visible problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact UI steps from a clean starting point.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitised diagnostics
      description: Paste only sanitised diagnostics from the app report preview. Do not paste raw logs.
      render: text
    validations:
      required: false
