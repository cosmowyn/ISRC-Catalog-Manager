[pytest]
# UI PQ has its own runtime coverage model: discovered widget inventory,
# traceability rows, deviations, and evidence artifacts. Keep this suite-local
# config separate from the repository-wide package coverage gate so the exact
# qualification command can run without weakening `make coverage`.
addopts = -q
markers =
    ui_pq: engineering UI process/performance qualification suite
pythonpath = ../..
testpaths = .
